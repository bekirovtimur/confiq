{% extends "base.html" %}

{% block title %}Доступ запрещен - Confiq{% endblock %}

{% block content %}
<div class="content-container">
    <div class="empty-state" style="padding: 64px 24px;">
        <div style="width: 120px; height: 120px; background: #fce8e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <span class="material-icons-round" style="font-size: 64px; color: #d93025;">block</span>
        </div>
        <h1 style="font-size: 6rem; font-weight: 300; color: var(--md-error); margin: 0;">403</h1>
        <h2 style="font-weight: 400; margin-top: 16px;">Доступ запрещен</h2>
        <p style="color: var(--md-on-surface-variant); margin: 16px 0 32px;">
            У вас нет прав для доступа к этой странице.
        </p>
        <a href="{{ url_for('user.dashboard' if current_user.is_authenticated else 'auth.login') }}" class="md-btn md-btn-filled">
            <span class="material-icons-round">home</span>
            На главную
        </a>
    </div>
</div>
{% endblock %}
