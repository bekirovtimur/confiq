{% extends "base.html" %}

{% block title %}Страница не найдена - Confiq{% endblock %}

{% block content %}
<div class="content-container">
    <div class="empty-state" style="padding: 64px 24px;">
        <div style="width: 120px; height: 120px; background: var(--md-surface-variant); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <span class="material-icons-round" style="font-size: 64px; color: var(--md-on-surface-variant);">search_off</span>
        </div>
        <h1 style="font-size: 6rem; font-weight: 300; color: var(--md-on-surface-variant); margin: 0;">404</h1>
        <h2 style="font-weight: 400; margin-top: 16px;">Страница не найдена</h2>
        <p style="color: var(--md-on-surface-variant); margin: 16px 0 32px;">
            Запрашиваемая страница не существует или была удалена.
        </p>
        <a href="{{ url_for('user.dashboard' if current_user.is_authenticated else 'auth.login') }}" class="md-btn md-btn-filled">
            <span class="material-icons-round">home</span>
            На главную
        </a>
    </div>
</div>
{% endblock %}
